name: legolas-ci

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: legolas-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-matrix:
    name: Node ${{ matrix.node-version }} test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18.17.0", "20", "22", "24"]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        run: npm test

  rust-workspace:
    name: Rust Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "18.17.0"

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install 1.95.0 --profile minimal --component clippy --component rustfmt
          rustup default 1.95.0

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Lint Rust workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust workspace tests
        run: cargo test --workspace

  smoke-and-package:
    name: Smoke And Package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "18.17.0"

      - name: Smoke test CLI
        run: npm run smoke

      - name: Verify package tarball
        run: npm run pack:check

  pack-check-windows:
    name: Pack Check Windows
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "18.17.0"

      - name: Verify package tarball
        run: npm run pack:check
